bombadle:
  jwt:
    secret: ${JWT_SECRET}
    # for jwt
    expiration-seconds: 3600 # 1 hour
    # for refresh token
    refresh-expiration-seconds: 2592000 # 30 days

  cookie:
    secure: ${COOKIE_SECURE:true}
    http-only: true
    same-site: ${COOKIE_SAME_SITE:Lax}
    domain: ${COOKIE_DOMAIN:}

  csrf:
    cookie-max-age-seconds: 3600
    secure: ${COOKIE_SECURE:true}
    same-site: Lax

  frontend:
    base-url: ${FRONTEND_BASE_URL:https://localhost:5173}

  daily-reset:
    enabled: true

  # CACHE CONFIGURATION
  cache:
    default-ttl: 3600 # 1 hour
    specs:
      character-card-compare:
        ttl: 1d
        max-size: 100 # number of cards
      top-3-leaderboard:
        ttl: 1d
        max-size: 1 # only one leaderboard
      classic-leaderboard:
        ttl: 1h
        max-size: 1000
      guess-list:
        ttl: 1h
        max-size: 100 # avg number of daily users +
      search-index:
        ttl: 1h
        max-size: 1




server:
  port: ${SERVER_PORT}
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: sigma
    key-store-type: PKCS12
    key-alias: springboot
  servlet:
    session:
      cookie:
        same-site: Lax
        secure: true   # true = https

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

logging:
  level:
    com.bombadle: INFO
