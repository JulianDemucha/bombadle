spring:
datasource:
url: jdbc:postgresql://localhost:5432/bombadle
username: postgres
password: root
driver-class-name: org.postgresql.Driver

jpa:
hibernate:
ddl-auto: none
database-platform: org.hibernate.dialect.PostgreSQLDialect
show-sql: true

flyway:
enabled: true
locations: classpath:db/migration
baseline-on-migrate: true
# out-of-order: false
# clean-disabled: true