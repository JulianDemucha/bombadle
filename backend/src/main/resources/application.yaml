bombadle:
  jwt:
    secret: ${JWT_SECRET}
    # for jwt
    expiration-seconds: 3600 # 1 hour
    # for refresh token
    refresh-expiration-seconds: 2592000 # 30 days

  cookie:
    secure: ${COOKIE_SECURE:true}
    http-only: true
    same-site: ${COOKIE_SAME_SITE:Lax}
    domain: ${COOKIE_DOMAIN:}

  csrf:
    cookie-max-age-seconds: 3600
    secure: ${COOKIE_SECURE:true}
    same-site: Lax

  frontend:
    base-url: ${FRONTEND_BASE_URL:https://localhost:5173}

  daily-reset:
    enabled: true

  email:
    from-address: ${MAIL_FROM}
    otp-expiration: 15m
    auto-activate-account: false
    email-rate-limit-seconds: 60

  # CACHE CONFIGURATION
  cache:
    default-ttl: 3600 # 1 hour
    specs:
      character-card-compare:
        ttl: 1d
        max-size: 150 # for target 50 cards x 3 ranked modes (CLASSIC, QUOTES_STAGE_2, IMAGES)
      previous-character-card:
        ttl: 1d
        max-size: 4 # number of game modes
      top-3-leaderboard:
        ttl: 1d
        max-size: 4 # number of game modes - was incorrectly 1 even though the cache key is per-mode
      full-leaderboard:
        ttl: 1h
        max-size: 1000
      today-solvers:
        ttl: 1h
        max-size: 4 # number of game modes
      guess-list:
        ttl: 1h
        max-size: 800 # ~200 daily active users x 4 modes
      player-basic-statistics:
        ttl: 1h
        max-size: 200 # ~200 daily active users
      player-detailed-statistics:
        ttl: 1h
        max-size: 200 # ~200 daily active users
      player-chart-statistics:
        ttl: 1h
        max-size: 200 # ~200 daily active users
      search-index:
        ttl: 1h
        max-size: 1




server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    session:
      cookie:
        same-site: ${COOKIE_SAME_SITE:Lax}
        secure: ${COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false   # SMTP flakiness shouldn't gate deploy health

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS}
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

logging:
  level:
    com.bombadle: INFO
